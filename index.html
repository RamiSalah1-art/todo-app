<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>قائمة مهامي</title>
    <style>
        body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    max-width: 600px;
    margin: 20px auto;
    padding: 20px;
    background-color: #f0f4f8;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
    color: #2c3e50;
}

.add-task-section {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.add-task-section input {
    flex: 1;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 16px;
}

.add-task-section button {
    background-color: #3498db;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 10px 20px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

.stats-section {
    margin-bottom: 20px;
    font-size: 18px;
    color: #2c3e50;
}

#tasksContainer div {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding: 12px 15px;
    background-color: white;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    border-right: 4px solid #3498db;
}

#tasksContainer span {
    flex: 1;
    font-size: 16px;
}

#tasksContainer button {
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s;
}

#tasksContainer button:hover {
    transform: scale(1.05);
}

#tasksContainer button:first-of-type {
    background-color: #2ecc71;
    color: white;
}

#tasksContainer button:last-of-type {
    background-color: #e74c3c;
    color: white;
}

.control-section {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

.control-section button {
    flex: 1;
    padding: 12px;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

#deleteCompletedBtn {
    background-color: #f39c12;
    color: white;
}

#clearAllBtn {
    background-color: #c0392b;
    color: white;
}

    </style>
</head>
<body>
    <h1>📋 قائمة مهامي</h1>
    
    <div class="add-task-section">
        <input id="taskInput" type="text" placeholder="اكتب مهمة جديدة..." />
        <button id="addTaskBtn">➕ إضافة</button>
    </div>

    <div class="stats-section">
        <p>📊 المهام المتبقية: <span id="pendingCount">0</span></p>
    </div>

    <div id="tasksContainer" class="tasks-container">
        <!-- المهام ستظهر هنا ديناميكياً -->
    </div>

    <div class="control-section">
        <button id="deleteCompletedBtn">🗑️ حذف المكتملة</button>
        <button id="clearAllBtn">⚠️ حذف الكل</button>
    </div>

    <br>
<div style="margin-top: 20px; padding: 15px; background-color: #fff3cd; border-radius: 8px;">
    <h3>😂 نكتة اليوم</h3>
    <p id="jokeSetup" style="font-weight: bold;">اضغط على الزر للحصول على نكتة</p>
    <p id="jokePunchline" style="color: #555;"></p>
    <button id="fetchJokeBtn">🔄 أحضر نكتة</button>
</div>

    <script>
        // الوصول للعناصر
        let taskInput = document.getElementById("taskInput");
        let addBtn = document.getElementById("addTaskBtn");
        let tasksDiv = document.getElementById("tasksContainer");

        // دالة إضافة مهمة
        const addTask = () => {
    let taskText = taskInput.value;
    if (taskText === "") {
        return;
    }
    
    let taskDiv = document.createElement("div");
    
    let taskSpan = document.createElement("span");
    taskSpan.textContent = taskText;
    
    let completeBtn = document.createElement("button");
    completeBtn.textContent = "✅";
    completeBtn.onclick = () => {
        taskSpan.style.textDecoration = "line-through";
        updatePendingCount();
        saveTasks();
    };
    
    let deleteBtn = document.createElement("button");
    deleteBtn.textContent = "❌";
    deleteBtn.onclick = () => {
        taskDiv.remove();
        updatePendingCount();
        saveTasks();
    };
    
    taskDiv.appendChild(taskSpan);
    taskDiv.appendChild(completeBtn);
    taskDiv.appendChild(deleteBtn);
    
    tasksDiv.appendChild(taskDiv);
    
    taskInput.value = "";
    
    console.log(`تمت إضافة مهمة جديدة: "${taskText}"`);
    
    updatePendingCount();
    saveTasks();
};
        // ربط الدالة بالزر
        addBtn.addEventListener("click", addTask);

        // الوصول لعداد المهام
        let pendingSpan = document.getElementById("pendingCount");

        // دالة تحديث العداد
        const updatePendingCount = () => {
            let allTasks = document.querySelectorAll("#tasksContainer div");
            let count = 0;
            
            for (let i = 0; i < allTasks.length; i = i + 1) {
                let taskDiv = allTasks[i];
                let span = taskDiv.querySelector("span");
                
                if (span.style.textDecoration !== "line-through") {
                    count = count + 1;
                }
            }
            
            pendingSpan.textContent = count;
        }

        // زر حذف المكتملة
        let deleteCompletedBtn = document.getElementById("deleteCompletedBtn");

        deleteCompletedBtn.onclick = function() {
            let allTasks = document.querySelectorAll("#tasksContainer div");
            
            for (let i = 0; i < allTasks.length; i = i + 1) {
                let taskDiv = allTasks[i];
                let span = taskDiv.querySelector("span");
                
                if (span.style.textDecoration === "line-through") {
                    taskDiv.remove();
                }
            }
            
            updatePendingCount();
            saveTasks();
        };

        // زر حذف الكل
        let clearAllBtn = document.getElementById("clearAllBtn");

        clearAllBtn.onclick = function() {
            let confirmDelete = confirm("هل أنت متأكد من حذف جميع المهام؟");
            
            if (confirmDelete === true) {
                tasksDiv.innerHTML = "";
                updatePendingCount();
                saveTasks();
            }
        };

        // دالة حفظ المهام في localStorage
        const saveTasks = () => {
    let allTasks = [];
    let taskElements = document.querySelectorAll("#tasksContainer div");
    
    for (let i = 0; i < taskElements.length; i = i + 1) {
        let taskDiv = taskElements[i];
        let span = taskDiv.querySelector("span");
        
        let defaultTask = { priority: "عادي", category: "عام" };
        
        let taskData = {
            text: span.textContent,
            completed: span.style.textDecoration === "line-through",
            ...defaultTask
        };
        
        allTasks.push(taskData);
    }
    
    localStorage.setItem("myTasks", JSON.stringify(allTasks));
};

        // دالة تحميل المهام من localStorage
const loadTasks = () => {
    let saved = localStorage.getItem("myTasks");
    
    if (saved) {
        let tasksArray = JSON.parse(saved);
        
        tasksDiv.innerHTML = "";
        
        for (let i = 0; i < tasksArray.length; i = i + 1) {
            let { text, completed } = tasksArray[i];
            
            let taskDiv = document.createElement("div");
            
            let taskSpan = document.createElement("span");
            taskSpan.textContent = text;
            if (completed) {
                taskSpan.style.textDecoration = "line-through";
            }
            
            let completeBtn = document.createElement("button");
            completeBtn.textContent = "✅";
            completeBtn.onclick = function() {
                taskSpan.style.textDecoration = "line-through";
                updatePendingCount();
                saveTasks();
            };
            
            let deleteBtn = document.createElement("button");
            deleteBtn.textContent = "❌";
            deleteBtn.onclick = function() {
                taskDiv.remove();
                updatePendingCount();
                saveTasks();
            };
            
            taskDiv.appendChild(taskSpan);
            taskDiv.appendChild(completeBtn);
            taskDiv.appendChild(deleteBtn);
            
            tasksDiv.appendChild(taskDiv);
        }
        
        updatePendingCount();
    }
};

        // تحميل المهام عند فتح الصفحة
        loadTasks();

        // الوصول للعناصر الجديدة
let jokeSetup = document.getElementById("jokeSetup");
let jokePunchline = document.getElementById("jokePunchline");
let fetchJokeBtn = document.getElementById("fetchJokeBtn");

// دالة جلب النكتة
// مصفوفة نكات عربية
const arabicJokes = [
    { setup: "لماذا الثلاجة غبية؟", punchline: "لأنها تحفظ كل شيء ولا تفهم شيئاً." },
    { setup: "لماذا السمك لا يستخدم الهاتف؟", punchline: "لأنه يخاف من الشبكة!" },
    { setup: "ما هو الحيوان الذي لا ينام؟", punchline: "المنبه." },
    { setup: "لماذا الحمار الوحشي لا يركب القطار؟", punchline: "لأنه مخطط له." },
    { setup: "كيف تعرف أن الفيل كان في الثلاجة؟", punchline: "من آثار أقدامه على الزبدة." },
    { setup: "لماذا الخبز سعيد؟", punchline: "لأنه محمص." }
];

const fetchJoke = () => {
    fetchJokeBtn.addEventListener("click", fetchJoke);
    jokeSetup.textContent = "جاري تحميل النكتة...";
    jokePunchline.textContent = "";
    
    // اختيار نكتة عشوائية من المصفوفة
    let randomIndex = Math.floor(Math.random() * arabicJokes.length);
    let randomJoke = arabicJokes[randomIndex];
    
    // تأخير بسيط لمحاكاة التحميل
    setTimeout(() => {
        jokeSetup.textContent = randomJoke.setup;
        jokePunchline.textContent = randomJoke.punchline;
    }, 500);
};

    </script>
</body>
</html>
